<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copilot Mem</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
    h1 { color: #58a6ff; margin-bottom: 20px; }
    .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
    .search-bar input { flex: 1; padding: 10px 14px; border: 1px solid #30363d; border-radius: 6px; background: #161b22; color: #c9d1d9; font-size: 14px; }
    .search-bar button { padding: 10px 20px; border: none; border-radius: 6px; background: #238636; color: #fff; cursor: pointer; font-size: 14px; }
    .search-bar button:hover { background: #2ea043; }
    .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid #30363d; }
    .tab { padding: 8px 16px; cursor: pointer; border-bottom: 2px solid transparent; color: #8b949e; }
    .tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px; margin-bottom: 12px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .card-type { font-size: 12px; padding: 2px 8px; border-radius: 12px; background: #30363d; color: #8b949e; }
    .card-type.chat_message { background: #1f3a5f; color: #58a6ff; }
    .card-type.file_edit { background: #2a1f3f; color: #bc8cff; }
    .card-type.manual { background: #1f3f2a; color: #56d364; }
    .card-time { font-size: 12px; color: #8b949e; }
    .card-content { white-space: pre-wrap; font-size: 13px; line-height: 1.5; }
    .card-actions { margin-top: 8px; text-align: right; }
    .btn-delete { background: none; border: 1px solid #da3633; color: #da3633; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .btn-delete:hover { background: #da3633; color: #fff; }
    .stats { display: flex; gap: 20px; margin-bottom: 20px; }
    .stat { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px; text-align: center; min-width: 120px; }
    .stat-value { font-size: 24px; font-weight: bold; color: #58a6ff; }
    .stat-label { font-size: 12px; color: #8b949e; margin-top: 4px; }
    .empty { text-align: center; color: #8b949e; padding: 40px; }
  </style>
</head>
<body>
  <h1>Copilot Mem</h1>
  <div class="stats" id="stats"></div>
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Search memories..." />
    <button onclick="doSearch()">Search</button>
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="observations" onclick="switchTab('observations')">Observations</div>
    <div class="tab" data-tab="sessions" onclick="switchTab('sessions')">Sessions</div>
  </div>
  <div id="content"></div>

  <script>
    const API = window.location.origin;
    let currentTab = 'observations';

    async function fetchJSON(url) {
      const res = await fetch(API + url);
      return res.json();
    }

    async function loadStats() {
      const [sessions, observations] = await Promise.all([
        fetchJSON('/api/sessions?limit=1000'),
        fetchJSON('/api/observations?limit=1000'),
      ]);
      document.getElementById('stats').innerHTML = `
        <div class="stat"><div class="stat-value">${sessions.length}</div><div class="stat-label">Sessions</div></div>
        <div class="stat"><div class="stat-value">${observations.length}</div><div class="stat-label">Observations</div></div>
      `;
    }

    function renderObservation(obs) {
      const meta = obs.metadata ? JSON.parse(obs.metadata) : null;
      const metaStr = meta ? `<div style="font-size:11px;color:#8b949e;margin-top:4px">${escapeHtml(JSON.stringify(meta))}</div>` : '';
      return `<div class="card">
        <div class="card-header">
          <span class="card-type ${escapeHtml(obs.type)}">${escapeHtml(obs.type)}</span>
          <span class="card-time">${escapeHtml(obs.created_at)}</span>
        </div>
        <div class="card-content">${escapeHtml(obs.content)}</div>
        ${metaStr}
        <div class="card-actions">
          <button class="btn-delete" onclick="deleteObs('${escapeHtml(obs.id)}')">Delete</button>
        </div>
      </div>`;
    }

    function renderSession(session) {
      return `<div class="card">
        <div class="card-header">
          <span class="card-type">${escapeHtml(session.project_path)}</span>
          <span class="card-time">${escapeHtml(session.started_at)}${session.ended_at ? ' → ' + escapeHtml(session.ended_at) : ' (active)'}</span>
        </div>
        ${session.summary ? `<div class="card-content">${escapeHtml(session.summary)}</div>` : ''}
      </div>`;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function loadObservations() {
      const data = await fetchJSON('/api/observations?limit=100');
      const el = document.getElementById('content');
      if (data.length === 0) {
        el.innerHTML = '<div class="empty">No observations yet.</div>';
      } else {
        el.innerHTML = data.map(renderObservation).join('');
      }
    }

    async function loadSessions() {
      const data = await fetchJSON('/api/sessions?limit=100');
      const el = document.getElementById('content');
      if (data.length === 0) {
        el.innerHTML = '<div class="empty">No sessions yet.</div>';
      } else {
        el.innerHTML = data.map(renderSession).join('');
      }
    }

    async function doSearch() {
      const q = document.getElementById('search-input').value.trim();
      if (!q) { loadObservations(); return; }
      const results = await fetchJSON(`/api/search?q=${encodeURIComponent(q)}`);
      const el = document.getElementById('content');
      if (results.length === 0) {
        el.innerHTML = '<div class="empty">No results found.</div>';
      } else {
        el.innerHTML = results.map(r => `<div class="card">
          <div class="card-header">
            <span class="card-type ${escapeHtml(r.type)}">${escapeHtml(r.type)}</span>
            <span class="card-time">${escapeHtml(r.created_at)} | score: ${r.score.toFixed(2)}</span>
          </div>
          <div class="card-content">${escapeHtml(r.snippet)}</div>
        </div>`).join('');
      }
    }

    async function deleteObs(id) {
      if (!confirm('Delete this observation?')) return;
      await fetch(API + '/api/observations/' + id, { method: 'DELETE' });
      loadObservations();
      loadStats();
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
      if (tab === 'observations') loadObservations();
      else loadSessions();
    }

    document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

    loadStats();
    loadObservations();
  </script>
</body>
</html>
